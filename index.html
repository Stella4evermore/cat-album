<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 小猫成长相册</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'SF Pro Text', 'Microsoft YaHei', sans-serif;
  }

  body {
    background-color: #fdf2f8;
    background-image: radial-gradient(#fbcfe866 1px, transparent 1px);
    background-size: 30px 30px;
    padding: 40px 20px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 36px;
    color: #e11d72;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 16px;
    color: #9ca3af;
  }

  .space-box {
    background: #fff;
    border-radius: 16px;
    padding: 14px 24px;
    text-align: center;
    font-size: 15px;
    color: #444;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    margin: 0 auto 30px;
    max-width: 420px;
  }

  .upload-card {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    margin-bottom: 40px;
  }

  .desc-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #fbcfe8;
    border-radius: 12px;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }

  .desc-input:focus {
    border-color: #e11d72;
  }

  .upload-btn {
    background: linear-gradient(135deg, #fbcfe8, #f9a8d4);
    color: #be185d;
    border: none;
    padding: 14px 30px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .upload-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(249, 168, 212, 0.4);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    position: relative;
    transition: transform 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
  }

  .card img,
  .card video {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }

  .file-info {
    padding: 12px;
    text-align: left;
  }

  .file-desc {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .file-meta {
    font-size: 12px;
    color: #999;
    display: flex;
    justify-content: space-between;
  }

  .del-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #e11d72;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #ccc;
    font-size: 16px;
  }

  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }

  #file {
    display: none;
  }
</style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🐱 小猫成长相册</h1>
      <p class="subtitle">照片/视频 · 文字描述 · 上传日期 · 云端永久保存</p>
    </header>

    <div class="space-box" id="spaceInfo">加载存储空间中…</div>

    <div class="upload-card">
      <input type="text" id="desc" class="desc-input" placeholder="写下小猫的故事/描述（可选）">
      <label for="file" class="upload-btn">选择照片/视频上传</label>
      <input type="file" id="file" accept="image/*,video/mp4">
    </div>

    <div class="grid" id="gallery">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const descInput = document.getElementById('desc');
    const gallery = document.getElementById('gallery');
    const spaceInfo = document.getElementById('spaceInfo');

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
    }

    // 格式化日期
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // 加载空间使用情况
    async function loadSpace() {
      try {
        const res = await fetch('/api/list');
        const data = await res.json();
        // ✅ 适配 Netlify：data.images 而非 data.blobs
        const total = data.images?.reduce((s, b) => s + (b.size || 0), 0) || 0;
        const max = 1024 * 1024 * 1024;
        spaceInfo.innerText = `已用 ${formatSize(total)} / 剩余 ${formatSize(max - total)}`;
      } catch (e) {
        spaceInfo.innerText = '空间获取失败';
      }
    }

    // 加载所有媒体（✅ 适配 Netlify 返回结构）
    async function loadMedia() {
      gallery.innerHTML = '<div class="loading">加载中…</div>';
      try {
        const res = await fetch('/api/list');
        const data = await res.json();
        // ✅ 适配 Netlify：data.images 而非 data.blobs
        if (!data.images || data.images.length === 0) {
          gallery.innerHTML = '<div class="empty">还没有小猫的照片或视频哦～</div>';
          return;
        }
        const blobs = data.images.sort((a, b) => new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0));
        gallery.innerHTML = blobs.map(b => `
          <div class="card">
            ${b.name.endsWith('.mp4')
              ? `<video src="${b.url}" controls muted playsinline></video>`
              : `<img src="${b.url}" alt="小猫">`
            }
            <div class="file-info">
              <div class="file-desc">${b.metadata?.desc || '暂无描述'}</div>
              <div class="file-meta">
                <span>${formatDate(b.uploadedAt || new Date())}</span>
                <span>${formatSize(b.size || 0)}</span>
              </div>
            </div>
            <button class="del-btn" onclick="del('${b.name}')">×</button>
          </div>
        `).join('');
      } catch (err) {
        gallery.innerHTML = '<div class="empty">加载失败</div>';
      }
    }

    // 删除文件（✅ 适配 Netlify：传 key 而非 path）
    async function del(name) {
      if (!confirm('确定要删除吗？删除后无法恢复')) return;
      try {
        await fetch('/api/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // ✅ 适配 Netlify：后端期待 { key: xxx }
          body: JSON.stringify({ key: name })
        });
        loadMedia();
        loadSpace();
      } catch (e) {
        alert('删除失败');
      }
    }

    // 上传文件（✅ 已支持 FormData，无需修改）
    fileInput.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const desc = descInput.value.trim();
      
      const form = new FormData();
      form.append('file', file);
      form.append('desc', desc);

      try {
        await fetch('/api/upload', { method: 'POST', body: form });
        alert('上传成功！');
        descInput.value = '';
        loadMedia();
        loadSpace();
        fileInput.value = '';
      } catch (err) {
        alert('上传失败');
      }
    });

    // 初始化
    (async () => {
      await loadMedia();
      await loadSpace();
    })();
  </script>
</body>
</html>
